
name: Predictive Maintenance MLOps Pipeline

on:
  push:
    branches:
      - main

jobs:

  register-dataset:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set Up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Dependencies
        run: |
          pip install --upgrade pip
          pip install -r HardeepKadian_PredictiveMaintenance/requirements.txt

      - name: Upload Dataset to Hugging Face Hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python HardeepKadian_PredictiveMaintenance/model_building/data_register.py


  data-preparation:

    needs: register-dataset

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set Up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Dependencies
        run: |
          pip install --upgrade pip
          pip install -r HardeepKadian_PredictiveMaintenance/requirements.txt

      - name: Run Data Preparation
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python HardeepKadian_PredictiveMaintenance/model_building/prep.py


  model-training:

    needs: data-preparation

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set Up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Dependencies
        run: |
          pip install --upgrade pip
          pip install -r HardeepKadian_PredictiveMaintenance/requirements.txt

      - name: Train Models
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python HardeepKadian_PredictiveMaintenance/model_building/train.py


  deploy-application:

    needs:
      - register-dataset
      - data-preparation
      - model-training

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set Up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Dependencies
        run: |
          pip install --upgrade pip
          pip install -r HardeepKadian_PredictiveMaintenance/requirements.txt

      - name: Deploy Streamlit App
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python HardeepKadian_PredictiveMaintenance/hosting/hosting.py
